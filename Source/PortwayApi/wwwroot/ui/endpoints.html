<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Endpoints · Portway</title>
  <link href="css/inter.css" rel="stylesheet">
  <link href="css/site.css" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="js/components/toast.js"></script>
  <script src="js/components/tooltip.js"></script>
  <script src="js/components/drawer.js"></script>
  <script src="js/components/alert-dialog.js"></script>
  <script src="js/components/promobar.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/shared.js"></script>
  <style>
    main { display: flex; flex-direction: column; }
    .page-body-fill { flex: 1; display: flex; flex-direction: column; }
  </style>
</head>
<body>

<aside></aside>

<main>
  <div class="page-header">
    <div class="page-title">
      <h1 class="select-none">Endpoints</h1>
    </div>
    <div class="header-actions">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="epSearch" placeholder="Search..." oninput="filterList()">
      </div>
      <button class="btn btn-outline" onclick="refreshAll()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
      <button class="btn btn-outline" onclick="openCreateDrawer()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Tab strip -->
  <div class="ep-tabs" id="epTabs"></div>

  <!-- Split panel -->
  <div class="page-body-fill" style="padding:0.75rem;padding-top:0.5rem;">
    <div class="ep-split">
      <!-- Left: list -->
      <div class="ep-list">
        <div class="ep-list-scroll" id="epListScroll">
          <div class="ep-empty" style="padding:1.5rem;font-size:0.8rem">Loading…</div>
        </div>
        <div class="ep-list-footer">
          <button class="btn btn-outline" style="width:100%;font-size:0.8rem" onclick="openCreateDrawer()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Endpoint
          </button>
        </div>
      </div>
      <!-- Right: detail -->
      <div class="ep-detail" id="epDetail">
        <div class="ep-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          <span>Select an endpoint to view and edit its configuration</span>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<!-- Create Drawer -->
<div class="drawer-backdrop" id="createBackdrop" data-drawer-backdrop="createDrawer"></div>
<div class="drawer" id="createDrawer">
  <div class="drawer-header">
    <h3 class="drawer-title">Add Endpoint</h3>
    <button class="btn btn-ghost btn-sm" data-drawer-close="createDrawer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body">
    <!-- Type selector tabs -->
    <div style="display:flex;gap:0.375rem;flex-wrap:wrap;margin-bottom:0rem" id="createTypePicker"></div>

    <div id="createForm"></div>

    <div style="margin-top:1.5rem;display:flex;gap:0.5rem;justify-content:flex-end">
      <button class="btn btn-outline" data-drawer-close="createDrawer">Cancel</button>
      <button class="btn btn-primary" onclick="submitCreate()">Create</button>
    </div>
  </div>
</div>

<script>
// Config ────────────────────────────────────────────────
const ENDPOINT_TYPES = [
  {
    key: 'sql', label: 'SQL', dotClass: 'dot-sql',
    fields: ['name','methods','schema','object_name','object_type','allowed_columns','is_private','allowed_environments','documentation'],
    defaultContent: { DatabaseObjectName: '', DatabaseSchema: 'dbo', DatabaseObjectType: 'Table', AllowedMethods: ['GET'], IsPrivate: false }
  },
  {
    key: 'proxy', label: 'Proxy', dotClass: 'dot-proxy',
    fields: ['name','url','methods','is_private','allowed_environments','documentation'],
    defaultContent: { Url: '', AllowedMethods: ['GET'], IsPrivate: false }
  },
  {
    key: 'composite', label: 'Composite', dotClass: 'dot-composite',
    fields: ['name','methods','is_private','allowed_environments','composite_steps','documentation'],
    defaultContent: { Type: 'Composite', AllowedMethods: ['GET'], IsPrivate: false, CompositeConfig: { Steps: [] } }
  },
  {
    key: 'file', label: 'File', dotClass: 'dot-file',
    fields: ['name','methods','storage_type','base_directory','allowed_extensions','is_private','allowed_environments'],
    defaultContent: { StorageType: 'Local', BaseDirectory: '', AllowedExtensions: ['.jpg','.png','.pdf'], AllowedMethods: ['GET','POST'], IsPrivate: false }
  },
  {
    key: 'static', label: 'Static', dotClass: 'dot-static',
    fields: ['name','methods','is_private','allowed_environments'],
    defaultContent: { AllowedMethods: ['GET'], IsPrivate: false }
  },
  {
    key: 'webhook', label: 'Webhook', dotClass: 'dot-webhook',
    fields: ['methods','schema','object_name','allowed_columns','is_private','documentation'],
    defaultContent: null // fixed file
  }
];

// State 
let _allData = {};        // { sql: [...], proxy: [...], ... }
let _activeTab = 'all';   // tab key or 'all'
let _selected = null;     // { type, name }
let _detailData = null;   // raw content from GET /ui/api/endpoints/{type}/{name}
let _dirty = false;
let _rawMode = false;
let _renaming = false;
let _createType = 'sql';
let _confirmingDelete = false;

function markDirty() { _dirty = true; }

function confirmNavigate(onConfirm) {
  if (!_dirty) {
    onConfirm();
    return;
  }
  
  AlertDialog.show({
    title: 'Are you sure?',
    description: 'You have unsaved changes in this endpoint. Are you sure you want to leave without saving?',
    actionLabel: 'Leave anyway',
    cancelLabel: 'Stay here',
    onConfirm: () => {
      _dirty = false;
      onConfirm();
    }
  });
}

function confirmNavigateSync() {
  if (!_dirty) return true;
  return confirm('You have unsaved changes. Leave without saving?');
}

window.addEventListener('beforeunload', e => {
  if (_dirty) { e.preventDefault(); e.returnValue = ''; }
});

// Init 
async function refreshAll() {
  confirmNavigate(async () => {
    try {
      const d = await fetch('/ui/api/endpoints').then(r => r.json());
      _allData = {
        sql:       (d.sql ?? []).map(e => ({ ...e, _type: 'sql' })),
        proxy:     (d.proxy ?? []).map(e => ({ ...e, _type: 'proxy' })),
        composite: (d.composite ?? []).map(e => ({ ...e, _type: 'composite' })),
        file:      (d.file ?? []).map(e => ({ ...e, _type: 'file' })),
        static:    (d.static ?? []).map(e => ({ ...e, _type: 'static' })),
        webhook:   (d.webhook ?? []).map(e => ({ ...e, _type: 'webhook' })),
      };
      renderTabs();
      renderList();
      if (_selected) selectEndpoint(_selected.type, _selected.name, false);
    } catch(e) {
      showToast('Failed to load endpoints: ' + e.message, 'error');
    }
  });
}

// Tabs 
function renderTabs() {
  const total = Object.values(_allData).reduce((s, a) => s + a.length, 0);
  const tabs = [{ key: 'all', label: 'All', count: total }, ...ENDPOINT_TYPES.map(t => ({ key: t.key, label: t.label, count: (_allData[t.key] ?? []).length }))];
  document.getElementById('epTabs').innerHTML = tabs.map(t => `
    <button class="ep-tab ${_activeTab === t.key ? 'active' : ''}" onclick="switchTab('${t.key}')">
      ${esc(t.label)}
      <span class="ep-tab-badge">${t.count}</span>
    </button>`).join('');
}

function switchTab(key) {
  confirmNavigate(() => {
    _activeTab = key;
    renderTabs();
    renderList();
  });
}

// List
function getFilteredItems() {
  const q = (document.getElementById('epSearch')?.value ?? '').toLowerCase();
  const types = _activeTab === 'all' ? ENDPOINT_TYPES.map(t => t.key) : [_activeTab];
  const results = [];
  for (const type of types) {
    for (const item of (_allData[type] ?? [])) {
      if (!q || (item.name ?? '').toLowerCase().includes(q) || type.includes(q)) {
        results.push(item);
      }
    }
  }
  return results;
}

function trySelect(type, name) {
  confirmNavigate(() => selectEndpoint(type, name));
}

function renderList() {
  const scroll = document.getElementById('epListScroll');
  const items = getFilteredItems();

  if (!items.length) {
    scroll.innerHTML = `<div class="ep-empty" style="padding:1.5rem;font-size:0.8rem">No endpoints found</div>`;
    return;
  }

  // Group by type
  const byType = {};
  for (const item of items) {
    (byType[item._type] = byType[item._type] ?? []).push(item);
  }

  let html = '';
  const showGroups = _activeTab === 'all';
  for (const typeKey of ENDPOINT_TYPES.map(t => t.key)) {
    const group = byType[typeKey];
    if (!group?.length) continue;
    const typeCfg = ENDPOINT_TYPES.find(t => t.key === typeKey);
    if (showGroups) {
      html += `<div class="ep-list-group">${esc(typeCfg?.label ?? typeKey)}</div>`;
    }
    for (const item of group) {
      const isActive = _selected?.type === typeKey && _selected?.name === item.name;
      html += `<div class="ep-list-item ${isActive ? 'active' : ''}" onclick="trySelect('${esc(typeKey)}','${esc(item.name)}')">
        <span class="ep-type-dot ${typeCfg?.dotClass ?? ''}"></span>
        <span class="ep-list-name">${esc(item.name)}</span>
      </div>`;
    }
  }
  scroll.innerHTML = html;
}

function filterList() {
  renderList();
}

// Detail
async function selectEndpoint(type, name, scroll = true) {
  _selected = { type, name };
  _confirmingDelete = false;
  renderList(); // update active state

  const detail = document.getElementById('epDetail');
  detail.innerHTML = `<div class="ep-empty"><span style="font-size:0.8rem;color:hsl(var(--muted-foreground))">Loading…</span></div>`;

  try {
    const d = await fetch(`/ui/api/endpoints/${type}/${name}`).then(r => r.json());
    if (d.error) throw new Error(d.error);
    _detailData = d;
    _dirty = false;
    _rawMode = false;
    renderDetail();
  } catch(e) {
    detail.innerHTML = `<div class="ep-empty"><span style="color:hsl(var(--destructive))">Error: ${esc(e.message)}</span></div>`;
  }
}

function renderDetail() {
  if (!_detailData) return;
  const { name, type, content, raw } = _detailData;
  const typeCfg = ENDPOINT_TYPES.find(t => t.key === type);
  const detail = document.getElementById('epDetail');
  const isWebhook = type === 'webhook';

  const nameDisplay = _renaming
    ? `<input type="text" id="renameInput" value="${esc(name)}" style="font-size:1rem;font-weight:600;flex:1;min-width:0;border:1px solid hsl(var(--primary));border-radius:var(--radius);padding:0.2rem 0.5rem;background:hsl(var(--background));color:hsl(var(--foreground))" onkeydown="if(event.key==='Enter')confirmRename();if(event.key==='Escape')cancelRename()" autofocus>
       <button class="btn btn-primary btn-sm" onclick="confirmRename()">Save</button>
       <button class="btn btn-outline btn-sm" onclick="cancelRename()">Cancel</button>`
    : `<h2>${esc(name)}</h2>
       <span class="badge badge-muted" style="font-size:0.7rem">${esc(typeCfg?.label ?? type)}</span>`;

  detail.innerHTML = `
    <div class="ep-detail-header">
      <span class="ep-type-dot ${typeCfg?.dotClass ?? ''}"></span>
      ${nameDisplay}
      ${_renaming ? '' : `<div class="actions">
        ${isWebhook ? '' : `<button class="btn btn-outline btn-sm shadcn-tooltip" onclick="startRename()" data-tooltip="Rename endpoint name">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Rename
        </button>`}
        <button class="btn btn-outline btn-sm" onclick="toggleRawMode()">
          ${_rawMode ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Structured' : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> Raw JSON'}
        </button>
        ${isWebhook ? '' : `<button class="btn btn-outline btn-sm" onclick="startDelete()" style="color:hsl(var(--destructive));border-color:hsl(var(--destructive)/0.4)" data-tooltip="Delete endpoint permanently">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>`}
      </div>`}
    </div>
    <div class="ep-detail-body" id="epDetailBody">
      ${_rawMode ? renderRawForm(raw) : renderStructuredForm(type, content)}
    </div>
    <div style="padding:0.75rem 1rem;border-top:1px solid hsl(var(--border));display:flex;gap:0.5rem;justify-content:flex-end;flex-shrink:0">
      <button class="btn btn-outline btn-sm" onclick="reloadDetail()">Discard</button>
      <button class="btn btn-primary btn-sm" onclick="saveEndpoint()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
    </div>`;
}

function renderRawForm(raw) {
  const pretty = (() => { try { return JSON.stringify(JSON.parse(raw), null, 2); } catch { return raw; } })();
  return `<div class="ep-raw-editor">
    <textarea id="rawContent" spellcheck="false">${esc(pretty)}</textarea>
  </div>`;
}

function renderStructuredForm(type, content) {
  const c = content ?? {};
  let inner;
  switch(type) {
    case 'sql':       inner = renderSqlForm(c);       break;
    case 'proxy':     inner = renderProxyForm(c);     break;
    case 'composite': inner = renderCompositeForm(c); break;
    case 'file':      inner = renderFileForm(c);      break;
    case 'static':    inner = renderStaticForm(c);    break;
    case 'webhook':   inner = renderWebhookForm(c);   break;
    default:          return `<div class="ep-empty">Unknown type</div>`;
  }
  return `<div class="ep-form">${inner}</div>`;
}

// Field helpers ─────────────────────────────────────────

function fieldText(id, label, value) {
  return `<div class="ep-field">
    <label for="${id}">${label}</label>
    <input type="text" id="${id}" value="${esc(value ?? '')}" oninput="markDirty()">
  </div>`;
}

function fieldSelect(id, label, value, options) {
  const opts = options.map(o => `<option ${value === o ? 'selected' : ''}>${esc(o)}</option>`).join('');
  return `<div class="ep-field">
    <label for="${id}">${label}</label>
    <select id="${id}" onchange="markDirty()">${opts}</select>
  </div>`;
}

function fieldMethods(selected, id = 'methodPicker') {
  const all = ['GET','POST','PUT','PATCH','DELETE'];
  const sel = [].concat(selected ?? ['GET']);   // normalise: string → [string], null/undefined → ['GET']
  return `<div class="ep-field">
    <label>Methods</label>
    <div class="method-picker" id="${id}">
      ${all.map(m => `<button type="button" class="method-btn m-${m.toLowerCase()} ${sel.includes(m) ? 'active' : ''}" onclick="toggleMethod(this); markDirty()">${m}</button>`).join('')}
    </div>
  </div>`;
}

function toggleMethod(btn) {
  btn.classList.toggle('active');
}

function fieldKV(id, label, obj) {
  const rows = Object.entries(obj ?? {}).map(([k, v]) => kvRow(k, v)).join('');
  return `<div class="ep-field">
    <label>${label}</label>
    <div class="ep-kv-editor" id="${id}">${rows}</div>
    <button type="button" class="ep-add-row" onclick="addKvRow('${id}')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add row
    </button>
  </div>`;
}

function fieldTextarea(id, label, value, minHeight = '80px', isCode = false) {
  return `<div class="ep-field">
    <label for="${id}">${label}</label>
    <textarea id="${id}" class="ep-textarea${isCode ? ' ep-textarea-code' : ''}" style="min-height:${minHeight}" oninput="markDirty()">${esc(value ?? '')}</textarea>
  </div>`;
}

function fieldDocumentation(c) {
  const doc = c.Documentation ?? {};
  const hasContent = !!(doc.TagDescription || doc.MethodDescriptions || doc.MethodDocumentation);
  return `<div class="accordion${hasContent ? '' : ''}">
    <button type="button" class="accordion-trigger" onclick="this.closest('.accordion').classList.toggle('open')" style="font-size:0.8125rem;padding:0.625rem 0.875rem;">
      <span>Documentation</span>
      <svg class="accordion-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="accordion-body">
      <div class="accordion-section" style="display:flex;flex-direction:column;gap:0.75rem;">
        ${fieldTextarea('docTagDescription', 'Tag Description', doc.TagDescription ?? '', '80px', true)}
        ${fieldTextarea('docMethodDescriptions', 'Method Descriptions (JSON)', doc.MethodDescriptions ? JSON.stringify(doc.MethodDescriptions, null, 2) : '', '72px', true)}
        ${fieldTextarea('docMethodDocumentation', 'Method Documentation (JSON)', doc.MethodDocumentation ? JSON.stringify(doc.MethodDocumentation, null, 2) : '', '100px', true)}
      </div>
    </div>
  </div>`;
}

function readDocumentation(c) {
  const tag  = document.getElementById('docTagDescription')?.value?.trim() ?? '';
  const descsRaw = document.getElementById('docMethodDescriptions')?.value?.trim() ?? '';
  const docsRaw  = document.getElementById('docMethodDocumentation')?.value?.trim() ?? '';
  let descs = null, docs = null;
  try { if (descsRaw) descs = JSON.parse(descsRaw); } catch {}
  try { if (docsRaw)  docs  = JSON.parse(docsRaw);  } catch {}
  if (!tag && !descs && !docs) return null;
  return {
    ...(tag   ? { TagDescription: tag }        : {}),
    ...(descs ? { MethodDescriptions: descs }  : {}),
    ...(docs  ? { MethodDocumentation: docs }  : {}),
  };
}

function kvRow(k = '', v = '') {
  return `<div class="ep-kv-row">
    <input type="text" placeholder="Key" value="${esc(k)}" oninput="markDirty()">
    <input type="text" placeholder="Value" value="${esc(v)}" oninput="markDirty()">
    <button type="button" class="btn btn-ghost btn-icon" onclick="this.closest('.ep-kv-row').remove(); markDirty()" title="Remove">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>`;
}

function addKvRow(id) {
  document.getElementById(id)?.insertAdjacentHTML('beforeend', kvRow());
}

function readKV(id) {
  const obj = {};
  document.querySelectorAll(`#${id} .ep-kv-row`).forEach(row => {
    const [kInput, vInput] = row.querySelectorAll('input');
    if (kInput?.value?.trim()) obj[kInput.value.trim()] = vInput?.value ?? '';
  });
  return obj;
}

function fieldColumns(id, label, arr) {
  const rows = (arr ?? []).map(col => colRow(col)).join('');
  return `<div class="ep-field">
    <label>${label}</label>
    <div class="ep-col-list" id="${id}">${rows}</div>
    <button type="button" class="ep-add-row" onclick="addColRow('${id}')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add column
    </button>
  </div>`;
}

function colRow(val = '') {
  return `<div class="ep-col-row">
    <input type="text" placeholder="ColumnName" value="${esc(val)}" oninput="markDirty()">
    <button type="button" class="btn btn-ghost btn-icon" onclick="this.closest('.ep-col-row').remove(); markDirty()" title="Remove">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>`;
}

function addColRow(id) {
  document.getElementById(id)?.insertAdjacentHTML('beforeend', colRow());
}

function readColumns(id) {
  return Array.from(document.querySelectorAll(`#${id} .ep-col-row input`))
    .map(i => i.value.trim()).filter(Boolean);
}

function readMethods(id = 'methodPicker') {
  return Array.from(document.querySelectorAll(`#${id} .method-btn.active`)).map(b => b.textContent.trim());
}

function fieldToggle(id, label, checked) {
  return `<div style="display:flex;align-items:center;gap:0.625rem;cursor:pointer;padding:0.25rem 0;" onclick="document.getElementById('${id}').click()">
    <label class="switch" onclick="event.stopPropagation()">
      <input type="checkbox" id="${id}" ${checked ? 'checked' : ''} onchange="markDirty()">
      <span class="slider"></span>
    </label>
    <span style="font-size:0.8125rem;font-weight:500;">${esc(label)}</span>
  </div>`;
}

function fieldAllowedEnvs(value) {
  return fieldText('allowedEnvironments', 'Environments', Array.isArray(value) ? value.join(', ') : (value ?? '*'));
}

function fieldJson(id, label, value, minHeight = '100px') {
  const str = value != null ? JSON.stringify(value, null, 2) : '';
  return fieldTextarea(id, label, str, minHeight, true);
}

function readJsonField(id) {
  const val = document.getElementById(id)?.value?.trim();
  if (!val) return undefined;
  try { return JSON.parse(val); } catch { return undefined; }
}

function accordion(label, contentHtml, open = false) {
  return `<div class="accordion${open ? ' open' : ''}">
    <button type="button" class="accordion-trigger" onclick="this.closest('.accordion').classList.toggle('open')" style="font-size:0.8125rem;padding:0.625rem 0.875rem;">
      <span>${label}</span>
      <svg class="accordion-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="accordion-body">
      <div class="accordion-section" style="display:flex;flex-direction:column;gap:0.75rem;">
        ${contentHtml}
      </div>
    </div>
  </div>`;
}

function fieldDocumentation(c) {
  const doc = c.Documentation ?? {};
  return accordion('Documentation',
    fieldTextarea('docTagDescription', 'Tag Description', doc.TagDescription ?? '', '80px', true) +
    fieldTextarea('docMethodDescriptions', 'Method Descriptions (JSON)', doc.MethodDescriptions ? JSON.stringify(doc.MethodDescriptions, null, 2) : '', '72px', true) +
    fieldTextarea('docMethodDocumentation', 'Method Documentation (JSON)', doc.MethodDocumentation ? JSON.stringify(doc.MethodDocumentation, null, 2) : '', '100px', true)
  );
}

// Validation
function readEnvs() {
  const raw = document.getElementById('allowedEnvironments')?.value ?? '*';
  const envs = raw.split(',').map(s => s.trim()).filter(Boolean);
  return envs.length === 1 && envs[0] === '*' ? '*' : envs;
}

function validateDocFields(errors) {
  const descsRaw = document.getElementById('docMethodDescriptions')?.value?.trim() ?? '';
  const docsRaw  = document.getElementById('docMethodDocumentation')?.value?.trim() ?? '';
  if (descsRaw) { try { JSON.parse(descsRaw); } catch { errors.push('Method Descriptions must be valid JSON'); } }
  if (docsRaw)  { try { JSON.parse(docsRaw);  } catch { errors.push('Method Documentation must be valid JSON'); } }
}

function validateForm(type) {
  const methods = readMethods();
  const errors = [];

  switch(type) {
    case 'sql':
      if (!document.getElementById('objectName')?.value?.trim()) errors.push('Object Name is required');
      if (!document.getElementById('schema')?.value?.trim())     errors.push('Schema is required');
      if (!methods.length) errors.push('At least one method must be selected');
      validateDocFields(errors);
      break;
    case 'proxy':
      if (!document.getElementById('url')?.value?.trim()) errors.push('URL is required');
      if (!methods.length) errors.push('At least one method must be selected');
      validateDocFields(errors);
      break;
    case 'composite':
      if (!methods.length) errors.push('At least one method must be selected');
      try { JSON.parse(document.getElementById('compositeSteps')?.value ?? '[]'); }
      catch { errors.push('Steps must be valid JSON'); }
      validateDocFields(errors);
      break;
    case 'file':
      if (!document.getElementById('baseDirectory')?.value?.trim()) errors.push('Base Directory is required');
      break;
    case 'static':
      if (!document.getElementById('contentFile')?.value?.trim()) errors.push('Content File is required');
      if (!document.getElementById('contentType')?.value?.trim()) errors.push('Content-Type is required');
      break;
    case 'webhook':
      if (!document.getElementById('objectName')?.value?.trim()) errors.push('Object Name is required');
      if (!document.getElementById('schema')?.value?.trim())     errors.push('Schema is required');
      if (!methods.length) errors.push('At least one method must be selected');
      validateDocFields(errors);
      break;
  }
  return errors;
}

// Collect form → JSON object
// Always spread existing content first so fields not shown in the UI are preserved.
function collectFormConfig(type, existingContent) {
  const c = existingContent ?? {};
  const methods = readMethods();
  const envs = readEnvs();

  switch(type) {
    case 'sql': {
      const cols     = readColumns('allowedCols');
      const reqCols  = readColumns('requiredCols');
      const doc      = readDocumentation(c);
      return {
        ...c,
        DatabaseSchema:       document.getElementById('schema')?.value?.trim() ?? 'dbo',
        DatabaseObjectName:   document.getElementById('objectName')?.value?.trim() ?? '',
        DatabaseObjectType:   document.getElementById('objectType')?.value ?? 'Table',
        Namespace:            document.getElementById('namespace')?.value?.trim() || undefined,
        NamespaceDisplayName: document.getElementById('namespaceDisplayName')?.value?.trim() || undefined,
        DisplayName:          document.getElementById('displayName')?.value?.trim() || undefined,
        IsPrivate:            document.getElementById('isPrivate')?.checked || undefined,
        AllowedEnvironments:  envs,
        AllowedMethods:       methods,
        Procedure:            document.getElementById('procedure')?.value?.trim() || undefined,
        PrimaryKey:           document.getElementById('primaryKey')?.value?.trim() || undefined,
        AllowedColumns:       cols.length ? cols : undefined,
        RequiredColumns:      reqCols.length ? reqCols : undefined,
        ColumnValidation:     readJsonField('columnValidation'),
        FunctionParameters:   readJsonField('functionParameters'),
        Documentation:        doc ?? undefined,
      };
    }
    case 'proxy': {
      const doc = readDocumentation(c);
      return {
        ...c,
        Url:                  document.getElementById('url')?.value?.trim() ?? '',
        Methods:              methods,
        Namespace:            document.getElementById('namespace')?.value?.trim() || undefined,
        NamespaceDisplayName: document.getElementById('namespaceDisplayName')?.value?.trim() || undefined,
        DisplayName:          document.getElementById('displayName')?.value?.trim() || undefined,
        AllowedEnvironments:  envs,
        IsPrivate:            document.getElementById('isPrivate')?.checked || undefined,
        DeletePatterns:       readJsonField('deletePatterns'),
        Documentation:        doc ?? undefined,
      };
    }
    case 'composite': {
      const doc   = readDocumentation(c);
      const steps = readJsonField('compositeSteps') ?? [];
      return {
        ...c,
        Type:                 'Composite',
        Methods:              methods,
        Namespace:            document.getElementById('namespace')?.value?.trim() || undefined,
        NamespaceDisplayName: document.getElementById('namespaceDisplayName')?.value?.trim() || undefined,
        DisplayName:          document.getElementById('displayName')?.value?.trim() || undefined,
        AllowedEnvironments:  envs,
        IsPrivate:            document.getElementById('isPrivate')?.checked || undefined,
        CompositeConfig: {
          ...c.CompositeConfig,
          Name:        document.getElementById('compositeConfigName')?.value?.trim() || undefined,
          Description: document.getElementById('compositeConfigDesc')?.value?.trim() || undefined,
          Steps:       steps,
        },
        Documentation: doc ?? undefined,
      };
    }
    case 'file': {
      const exts = (document.getElementById('allowedExtensions')?.value ?? '').split(',').map(s=>s.trim()).filter(Boolean);
      const doc  = readDocumentation(c);
      return {
        ...c,
        StorageType:          document.getElementById('storageType')?.value ?? 'Local',
        BaseDirectory:        document.getElementById('baseDirectory')?.value?.trim() ?? '',
        AllowedExtensions:    exts,
        Namespace:            document.getElementById('namespace')?.value?.trim() || undefined,
        NamespaceDisplayName: document.getElementById('namespaceDisplayName')?.value?.trim() || undefined,
        DisplayName:          document.getElementById('displayName')?.value?.trim() || undefined,
        AllowedEnvironments:  envs,
        IsPrivate:            document.getElementById('isPrivate')?.checked || undefined,
        Documentation:        doc ?? undefined,
      };
    }
    case 'static': {
      const doc = readDocumentation(c);
      return {
        ...c,
        ContentType:          document.getElementById('contentType')?.value?.trim() ?? 'application/json',
        ContentFile:          document.getElementById('contentFile')?.value?.trim() ?? '',
        EnableFiltering:      document.getElementById('enableFiltering')?.checked ?? false,
        Namespace:            document.getElementById('namespace')?.value?.trim() || undefined,
        NamespaceDisplayName: document.getElementById('namespaceDisplayName')?.value?.trim() || undefined,
        DisplayName:          document.getElementById('displayName')?.value?.trim() || undefined,
        AllowedEnvironments:  envs,
        IsPrivate:            document.getElementById('isPrivate')?.checked || undefined,
        Documentation:        doc ?? undefined,
      };
    }
    case 'webhook': {
      const cols    = readColumns('allowedCols');
      const reqCols = readColumns('requiredCols');
      const doc     = readDocumentation(c);
      return {
        ...c,
        DatabaseObjectName:   document.getElementById('objectName')?.value?.trim() ?? '',
        DatabaseSchema:       document.getElementById('schema')?.value?.trim() ?? 'dbo',
        AllowedColumns:       cols.length ? cols : undefined,
        AllowedMethods:       methods,
        AllowedEnvironments:  envs,
        Namespace:            document.getElementById('namespace')?.value?.trim() || undefined,
        NamespaceDisplayName: document.getElementById('namespaceDisplayName')?.value?.trim() || undefined,
        DisplayName:          document.getElementById('displayName')?.value?.trim() || undefined,
        IsPrivate:            document.getElementById('isPrivate')?.checked || undefined,
        RequiredColumns:      reqCols.length ? reqCols : undefined,
        ColumnValidation:     readJsonField('columnValidation'),
        Documentation:        doc ?? undefined,
      };
    }
  }
  return {};
}

// Save 
async function saveEndpoint() {
  if (!_selected || !_detailData) return;
  const { type, name } = _selected;

  let body;
  if (_rawMode) {
    const raw = document.getElementById('rawContent')?.value ?? '';
    try { JSON.parse(raw); } catch(e) { showToast('Invalid JSON: ' + e.message, 'error'); return; }
    body = { content: raw };
    try {
      const r = await fetch(`/ui/api/endpoints/${type}/${name}?raw=true`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error ?? r.statusText);
      showToast('Saved', 'success');
      _dirty = false;
      await refreshAll();
    } catch(e) { showToast('Save failed: ' + e.message, 'error'); }
  } else {
    const errs = validateForm(type);
    if (errs.length) { showToast(errs[0], 'error'); return; }
    const cfg = collectFormConfig(type, _detailData.content);
    body = { content: cfg };
    try {
      const r = await fetch(`/ui/api/endpoints/${type}/${name}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error ?? r.statusText);
      showToast('Saved', 'success');
      _dirty = false;
      await refreshAll();
    } catch(e) { showToast('Save failed: ' + e.message, 'error'); }
  }
}

function toggleRawMode() {
  confirmNavigate(() => {
    _rawMode = !_rawMode;
    renderDetail();
  });
}

async function reloadDetail() {
  confirmNavigate(async () => {
    if (_selected) await selectEndpoint(_selected.type, _selected.name, false);
  });
}

    variant: actionLabel.toLowerCase() === 'delete' ? 'destructive' : 'default',
    extraHtml,
    onConfirm
  });
}

function hideAlertDialog() {
  AlertDialog.hide();
}

function confirmAlertDialog() {
  // Handled by AlertDialog component
}

// Delete 
function startDelete() {
  if (!_selected) return;
  const { name } = _selected;
  showAlertDialog({
    title: `Delete "${name}"?`,
    description: 'This action cannot be undone. The endpoint files will be permanently removed.',
    actionLabel: 'Delete',
    onConfirm: confirmDelete
  });
}

async function confirmDelete() {
  if (!_selected) return;
  const { type, name } = _selected;
  try {
    const r = await fetch(`/ui/api/endpoints/${type}/${name}`, { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error ?? r.statusText);
    showToast(`${name} deleted`, 'success');
    _selected = null;
    _detailData = null;
    document.getElementById('epDetail').innerHTML = `<div class="ep-empty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <span>Select an endpoint to view and edit its configuration</span>
    </div>`;
    await refreshAll();
  } catch(e) {
    showToast('Delete failed: ' + e.message, 'error');
  }
}

// Rename ────────────────────────────────────────────────

function startRename() {
  _renaming = true;
  renderDetail();
}

function cancelRename() {
  _renaming = false;
  renderDetail();
}

async function confirmRename() {
  const newName = document.getElementById('renameInput')?.value?.trim() ?? '';
  if (!newName) { showToast('Name is required', 'error'); return; }
  if (!/^[a-zA-Z0-9_-]+(\/[a-zA-Z0-9_-]+)*$/.test(newName)) {
    showToast('Name may only contain letters, numbers, hyphens, underscores, or forward slashes', 'error'); return;
  }
  const { type, name } = _selected;
  try {
    const r = await fetch(`/ui/api/endpoints/${type}/${name}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ new_name: newName })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error ?? r.statusText);
    showToast('Renamed successfully', 'success');
    _renaming = false;
    await refreshAll();
    selectEndpoint(type, newName);
  } catch(e) { showToast('Rename failed: ' + e.message, 'error'); }
}

        <div class="ep-section-title">Access</div>
        ${fieldAllowedEnvs('*')}
        ${fieldToggle('createIsPrivate', 'Private', false)}
      </div>`;
      break;
    case 'static':
      html += `<div class="ep-section">
        <div class="ep-section-title">Content</div>
        ${fieldText('createContentFile', 'Content File', '')}
        ${fieldText('createContentType', 'Content-Type', 'application/json')}
        ${fieldToggle('createEnableFiltering', 'Enable OData Filtering', false)}
      </div>
      <div class="ep-section">
        <div class="ep-section-title">Access</div>
        ${fieldAllowedEnvs('*')}
        ${fieldToggle('createIsPrivate', 'Private', false)}
      </div>`;
      break;
  }

  document.getElementById('createForm').innerHTML = html;
}

async function submitCreate() {
  const name = (document.getElementById('createName')?.value ?? '').trim();
  if (!name) { showToast('Name is required', 'error'); return; }
  if (!/^[a-zA-Z0-9_-]+$/.test(name)) { showToast('Name must use only letters, numbers, hyphens, or underscores', 'error'); return; }

  const methods = readMethods('createMethodPicker');
  const envs = readEnvs();
  let content;
  let validationErr = null;

  switch(_createType) {
    case 'sql': {
      const objectName = document.getElementById('createObjectName')?.value?.trim();
      if (!objectName) { validationErr = 'Object Name is required'; break; }
      if (!methods.length) { validationErr = 'At least one method must be selected'; break; }
      const createDisplayName = document.getElementById('createDisplayName')?.value?.trim();
      const createNsDisplayName = document.getElementById('createNamespaceDisplayName')?.value?.trim();
      const createDoc = readDocumentation({});
      const errors = [];
      validateDocFields(errors);
      if (errors.length) { validationErr = errors[0]; break; }
      content = {
        DatabaseObjectName: objectName,
        DatabaseSchema: document.getElementById('createSchema')?.value?.trim() ?? 'dbo',
        DatabaseObjectType: document.getElementById('createObjectType')?.value ?? 'Table',
        AllowedMethods: methods,
        AllowedEnvironments: envs,
        IsPrivate: document.getElementById('createIsPrivate')?.checked ?? false,
        ...(createDisplayName ? { DisplayName: createDisplayName } : {}),
        ...(createNsDisplayName ? { NamespaceDisplayName: createNsDisplayName } : {}),
        ...(createDoc ? { Documentation: createDoc } : {})
      }; break; }
    case 'proxy': {
      const url = document.getElementById('createUrl')?.value?.trim();
      if (!url) { validationErr = 'URL is required'; break; }
      if (!methods.length) { validationErr = 'At least one method must be selected'; break; }
      const createProxyDoc = readDocumentation({});
      const proxyErrors = [];
      validateDocFields(proxyErrors);
      if (proxyErrors.length) { validationErr = proxyErrors[0]; break; }
      content = {
        Url: url,
        Methods: methods,
        AllowedEnvironments: envs,
        IsPrivate: document.getElementById('createIsPrivate')?.checked ?? false,
        ...(createProxyDoc ? { Documentation: createProxyDoc } : {})
      }; break; }
    case 'composite': {
      if (!methods.length) { validationErr = 'At least one method must be selected'; break; }
      let steps = [];
      try { steps = JSON.parse(document.getElementById('createSteps')?.value ?? '[]'); }
      catch { validationErr = 'Steps must be valid JSON'; break; }
      const createCompDoc = readDocumentation({});
      const compErrors = [];
      validateDocFields(compErrors);
      if (compErrors.length) { validationErr = compErrors[0]; break; }
      content = {
        Type: 'Composite',
        Methods: methods,
        AllowedEnvironments: envs,
        IsPrivate: document.getElementById('createIsPrivate')?.checked ?? false,
        CompositeConfig: { Steps: steps },
        ...(createCompDoc ? { Documentation: createCompDoc } : {})
      }; break; }
    case 'file': {
      const baseDir = document.getElementById('createBaseDir')?.value?.trim();
      if (!baseDir) { validationErr = 'Base Directory is required'; break; }
      const exts = (document.getElementById('createExtensions')?.value ?? '').split(',').map(s=>s.trim()).filter(Boolean);
      content = {
        StorageType: document.getElementById('createStorageType')?.value ?? 'Local',
        BaseDirectory: baseDir,
        AllowedExtensions: exts,
        AllowedEnvironments: envs,
        IsPrivate: document.getElementById('createIsPrivate')?.checked ?? false
      }; break; }
    case 'static': {
      const contentFile = document.getElementById('createContentFile')?.value?.trim();
      const contentType = document.getElementById('createContentType')?.value?.trim();
      if (!contentFile) { validationErr = 'Content File is required'; break; }
      if (!contentType) { validationErr = 'Content-Type is required'; break; }
      content = {
        ContentFile: contentFile,
        ContentType: contentType,
        EnableFiltering: document.getElementById('createEnableFiltering')?.checked ?? false,
        AllowedEnvironments: envs,
        IsPrivate: document.getElementById('createIsPrivate')?.checked ?? false
      }; break; }
    default:
      content = {};
  }

  if (validationErr) { showToast(validationErr, 'error'); return; }

  try {
    const r = await fetch(`/ui/api/endpoints/${_createType}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, content: JSON.stringify(content, null, 2) })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error ?? r.statusText);
    showToast(`${name} created`, 'success');
    closeCreateDrawer();
    await refreshAll();
    selectEndpoint(_createType, name);
  } catch(e) {
    showToast('Create failed: ' + e.message, 'error');
  }
}

// Toast helper
function showToast(msg, type = 'success') { toast(msg, type); }

// Bootstrap
Drawer.onClose('createDrawer', () => { _dirty = _preDrawerDirty; });
refreshAll();
</script>
</body>
</html>
