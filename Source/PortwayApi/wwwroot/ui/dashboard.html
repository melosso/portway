<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · Portway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/css/site.css" rel="stylesheet" />
</head>
<body>

<aside>
  <div class="brand select-none">
    <div class="brand-avatar">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" class="brand-avatar-bg" aria-hidden="true">
        <g clip-path="url(#portway-clip)">
          <rect width="20" height="20" fill="#000" rx="5.5"/>
          <rect width="20" height="20" fill="url(#portway-grad)" fill-opacity="0.2" rx="5.5"/>
          <g filter="url(#portway-blur-1)" opacity="0.3"><circle cx="16" cy="17" r="6" fill="#FF64B4" fill-opacity="0.671"/></g>
          <g filter="url(#portway-blur-2)" opacity="0.1"><circle cx="16" cy="16" r="6" fill="#FF64B4" fill-opacity="0.671"/></g>
          <g filter="url(#portway-blur-3)" opacity="0.4"><circle cx="17" cy="19" r="6" fill="#FF64B4" fill-opacity="0.671"/></g>
          <rect width="20" height="20" fill="#FF64B4" fill-opacity="0.15" rx="5.5"/>
          <g style="mix-blend-mode:hard-light"><rect width="20" height="20" fill="#6A62FF" fill-opacity="0.1" rx="5.5"/></g>
        </g>
        <rect width="19" height="19" x="0.5" y="0.5" stroke="#FDFDFD" stroke-opacity="0.1" rx="5"/>
        <defs>
          <filter id="portway-blur-1" width="32" height="32" x="0" y="1" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse"><feFlood flood-opacity="0" result="BackgroundImageFix"/><feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/><feGaussianBlur result="effect1_foregroundBlur" stdDeviation="5"/></filter>
          <filter id="portway-blur-2" width="22" height="22" x="5" y="5" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse"><feFlood flood-opacity="0" result="BackgroundImageFix"/><feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/><feGaussianBlur result="effect1_foregroundBlur" stdDeviation="2.5"/></filter>
          <filter id="portway-blur-3" width="22" height="22" x="6" y="8" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse"><feFlood flood-opacity="0" result="BackgroundImageFix"/><feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/><feGaussianBlur result="effect1_foregroundBlur" stdDeviation="2.5"/></filter>
          <linearGradient id="portway-grad" x1="10" x2="10" y1="0" y2="20" gradientUnits="userSpaceOnUse"><stop stop-color="#FDFDFD"/><stop offset="1" stop-color="#FDFDFD" stop-opacity="0"/></linearGradient>
          <clipPath id="portway-clip"><rect width="20" height="20" fill="#FDFDFD" rx="5.5"/></clipPath>
        </defs>
      </svg>
      <svg class="brand-avatar-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#FDFDFD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </div>
    <span class="brand-name">Portway</span>
  </div>

  <div class="nav-group">
    <div class="nav-label">Navigation</div>
    <a href="/ui/dashboard" class="nav-item active">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/ui/endpoints" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Endpoints
    </a>
    <a href="/ui/environments" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      Environments
    </a>
    <a href="/ui/settings" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
    <a href="/ui/logs" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Logs
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="sidebar-footer-meta">
      <div class="sidebar-version" id="sidebarVersion"></div>
      <span class="tooltip-wrapper">
        <a href="https://github.com/melosso/porway" target="_blank" rel="noopener" class="github-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        </a>
        <span class="tooltip tooltip-above tooltip-right">View on GitHub</span>
      </span>
    </div>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>
</aside>

<main>
  <div class="page-header">
    <div class="page-title">
      <h1 class="select-none">Dashboard</h1>
      <span class="page-subtitle" id="versionLabel"></span>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="load()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <div class="page-body">

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">SQL Endpoints</div>
        <div class="stat-value" id="statSql">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Proxy Endpoints</div>
        <div class="stat-value" id="statProxy">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">File / Static</div>
        <div class="stat-value" id="statFile">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Environments</div>
        <div class="stat-value" id="statEnvs">—</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Service Health</span>
          <span class="badge badge-muted" id="healthBadge">—</span>
        </div>
        <div class="card-body">
          <div class="kv-grid">
            <span class="kv-key">Status</span><span class="kv-val" id="healthStatus">—</span>
            <span class="kv-key">Uptime</span><span class="kv-val" id="healthUptime">—</span>
            <span class="kv-key">Version</span><span class="kv-val" id="healthVersion">—</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Endpoint Breakdown</span></div>
        <div class="card-body" id="breakdownBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>
    </div>

  </div>
</main>

<script>
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function load() {
  try {
    const d = await fetch('/ui/api/overview').then(r => r.json());
    const ep = d.endpoints ?? {};
    document.getElementById('statSql').textContent = ep.sql ?? '—';
    document.getElementById('statProxy').textContent = (ep.proxy ?? 0) + (ep.composite ? ` (+${ep.composite})` : '');
    document.getElementById('statFile').textContent = ((ep.file ?? 0) + (ep.static ?? 0)) || '—';
    document.getElementById('statEnvs').textContent = d.environments ?? '—';

    const v = (d.version ?? '').split('+')[0];
    document.getElementById('versionLabel').textContent = v ? `v${v}` : '';
    document.getElementById('sidebarVersion').textContent = v ? `v${v}` : '';
    document.getElementById('healthVersion').textContent = v || '—';
    document.getElementById('healthUptime').textContent = d.uptime ?? '—';

    const rows = [
      ['SQL', ep.sql ?? 0],
      ['Proxy', ep.proxy ?? 0],
      ['Composite', ep.composite ?? 0],
      ['File', ep.file ?? 0],
      ['Static', ep.static ?? 0],
      ['Webhook', ep.webhook ?? 0],
    ].filter(([,n]) => n > 0);

    document.getElementById('breakdownBody').innerHTML = rows.length
      ? '<div class="kv-grid">' + rows.map(([k,v]) =>
          `<span class="kv-key">${esc(k)}</span><span class="kv-val">${v}</span>`
        ).join('') + `<span class="kv-key" style="border-top:1px solid hsl(var(--border));padding-top:0.5rem;font-weight:600;color:hsl(var(--foreground))">Total</span>
         <span class="kv-val" style="border-top:1px solid hsl(var(--border));padding-top:0.5rem;font-weight:600;color:hsl(var(--foreground))">${ep.total ?? 0}</span>` + '</div>'
      : '<span class="muted" style="font-size:0.8rem">No endpoints configured</span>';
  } catch(e) { console.error('overview', e); }

  try {
    const d = await fetch('/health').then(r => r.json());
    const ok = (d.status ?? '').toLowerCase() === 'healthy';
    document.getElementById('healthStatus').textContent = d.status ?? '—';
    const badge = document.getElementById('healthBadge');
    badge.textContent = d.status ?? 'unknown';
    badge.className = `badge ${ok ? 'badge-success' : 'badge-warning'}`;
  } catch(e) {
    document.getElementById('healthBadge').textContent = 'unavailable';
    document.getElementById('healthBadge').className = 'badge badge-muted';
    document.getElementById('healthStatus').textContent = 'unavailable';
  }
}

load();

function logout() {
  fetch('/ui/api/auth/logout', { method: 'POST', credentials: 'include' })
    .finally(() => { window.location.href = '/ui/login'; });
}
</script>
</body>
</html>
