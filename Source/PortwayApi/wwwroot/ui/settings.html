          <filter id="portway-blur-3" width="22" height="22" x="6" y="8" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse"><feFlood flood-opacity="0" result="BackgroundImageFix"/><feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/><feGaussianBlur result="effect1_foregroundBlur" stdDeviation="2.5"/></filter>

        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>

  </div>

  <div class="nav-group">
    <div class="nav-label">Navigation</div>

    <a href="/ui/endpoints" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Endpoints
    </a>
    <a href="/ui/environments" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      Environments
    </a>

      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings

    <a href="/ui/logs" class="nav-item">

  <div class="sidebar-footer">

      <div class="sidebar-version" id="sidebarVersion"></div>

        </a>
        <span class="tooltip tooltip-above tooltip-right">View on GitHub</span>
      </span>
    </div>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>
</aside>

<main>
  <div class="page-header">
    <div class="page-title">
      <h1 class="select-none">Settings</h1>
      <span class="page-subtitle">Read-only view</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="load()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <div class="page-body">
    <div class="settings-grid">

      <div class="card">
        <div class="card-header"><span class="card-title">Rate Limiting</span></div>
        <div class="card-body" id="rateLimitBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Caching</span></div>
        <div class="card-body" id="cachingBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">SQL Connection Pooling</span></div>
        <div class="card-body" id="sqlBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">File Storage</span></div>
        <div class="card-body" id="fileBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Logging</span></div>
        <div class="card-body" id="loggingBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Endpoint Reloading</span></div>
        <div class="card-body" id="reloadBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>

    </div>
  </div>
</main>

<script>
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function settingItem(label, value, desc) {
  return `<div class="settings-item">
    <div>
      <div class="settings-item-label">${label}</div>
      ${desc ? `<div class="settings-item-desc">${esc(desc)}</div>` : ''}
    </div>
    <span class="settings-item-value">${esc(String(value ?? '—'))}</span>
  </div>`;
}

function boolItem(label, value, desc) {
  return settingItem(label, value ? 'Enabled' : 'Disabled', desc);
}

async function load() {
  try {
    const d = await fetch('/ui/api/settings').then(r => r.json());
    const rl = d.rate_limiting ?? {};
    const c = d.caching ?? {};
    const sql = d.sql_pooling ?? {};
    const f = d.file_storage ?? {};
    const log = d.logging ?? {};
    const ep = d.endpoint_reloading ?? {};

    document.getElementById('rateLimitBody').innerHTML = [
      boolItem('Enabled', rl.enabled),
      settingItem('IP Limit', rl.ip_limit != null ? `${rl.ip_limit} req / ${rl.ip_window_seconds}s` : '—'),
      settingItem('Token Limit', rl.token_limit != null ? `${rl.token_limit} req / ${rl.token_window_seconds}s` : '—'),
    ].join('');

    document.getElementById('cachingBody').innerHTML = [
      boolItem('Enabled', c.enabled),
      settingItem('Provider', c.provider ?? '—'),
      settingItem('Default Duration', c.default_duration_seconds != null ? `${c.default_duration_seconds}s` : '—'),
      settingItem('Max Items', c.max_items ?? '—'),
      settingItem('Max Size', c.max_size_mb != null ? `${c.max_size_mb} MB` : '—'),
    ].join('');

    document.getElementById('sqlBody').innerHTML = [
      boolItem('Enabled', sql.enabled),
      settingItem('Pool Size', sql.min_pool_size != null ? `${sql.min_pool_size} – ${sql.max_pool_size}` : '—'),
      settingItem('Connection Timeout', sql.connection_timeout != null ? `${sql.connection_timeout}s` : '—'),
      settingItem('Command Timeout', sql.command_timeout != null ? `${sql.command_timeout}s` : '—'),
    ].join('');

    document.getElementById('fileBody').innerHTML = [
      settingItem('Storage Directory', f.directory || '—'),
      settingItem('Max File Size', f.max_file_size_mb != null ? `${f.max_file_size_mb} MB` : '—'),
    ].join('');

    document.getElementById('loggingBody').innerHTML = [
      settingItem('Minimum Level', log.min_level ?? '—'),
      settingItem('Sinks', (log.sinks ?? []).join(', ') || '—'),
    ].join('');

    document.getElementById('reloadBody').innerHTML = [
      boolItem('Enabled', ep.enabled),
      settingItem('Debounce', ep.debounce_ms != null ? `${ep.debounce_ms}ms` : '—'),
    ].join('');

  } catch(e) {
    const msg = `<div class="muted" style="font-size:0.8rem">Failed to load: ${esc(e.message)}</div>`;
    ['rateLimitBody','cachingBody','sqlBody','fileBody','loggingBody','reloadBody'].forEach(id => {
      document.getElementById(id).innerHTML = msg;
    });
  }

  try {
    const d = await fetch('/ui/api/overview').then(r => r.json());
    const v = (d.version ?? '').split('+')[0];
    document.getElementById('sidebarVersion').textContent = v ? `v${v}` : '';
  } catch(_) {}
}

load();

function logout() {
  fetch('/ui/api/auth/logout', { method: 'POST', credentials: 'include' })
    .finally(() => { window.location.href = '/ui/login'; });
}
</script>
</body>
</html>
