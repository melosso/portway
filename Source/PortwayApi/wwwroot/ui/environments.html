<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Environments · Portway</title>
  <link href="css/inter.css" rel="stylesheet">
  <link href="css/site.css" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="js/components/toast.js"></script>
  <script src="js/components/tooltip.js"></script>
  <script src="js/components/drawer.js"></script>
  <script src="js/components/alert-dialog.js"></script>
  <script src="js/components/promobar.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/kv-editor.js"></script>
  <style>
    main { display: flex; flex-direction: column; }
    .page-body-fill { flex: 1; display: flex; flex-direction: column; }
  </style>
</head>
<body>

<aside></aside>

<main>
  <div class="page-header">
    <div class="page-title">
      <h1 class="select-none">Environments</h1>
    </div>
    <div class="header-actions">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="envSearchInput" placeholder="Search..." oninput="filterEnvList()">
      </div>
      <button class="btn btn-outline" onclick="refreshAll()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
      <button class="btn btn-outline" onclick="openCreateDrawer()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Tab strip -->
  <div class="ep-tabs" id="envTabs"></div>

  <div class="page-body-fill" style="padding:0.75rem;padding-top:0.5rem;">
    <div class="ep-split">

      <!-- Left: list -->
      <div class="ep-list">
        <div class="ep-list-scroll" id="envListScroll">
          <div class="ep-empty" style="padding:1.5rem;font-size:0.8rem">Loading…</div>
        </div>
        <div class="ep-list-footer">
          <button class="btn btn-outline" style="width:100%;font-size:0.8rem" onclick="openCreateDrawer()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Environment
          </button>
        </div>
      </div>

      <!-- Right: detail -->
      <div class="ep-detail" id="envDetail">
        <div class="ep-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="1"/></svg>
          Loading…
        </div>
      </div>

    </div>
  </div>
</main>

<!-- Create Environment Drawer -->
<div class="drawer-backdrop" id="createBackdrop" data-drawer-backdrop="createDrawer"></div>
<div class="drawer" id="createDrawer">
  <div class="drawer-header">
    <span class="drawer-title">Add Environment</span>
    <button class="btn-icon" data-drawer-close="createDrawer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body">
    <div class="drawer-field">
      <label>Name <span style="color:hsl(var(--destructive))">*</span></label>
      <input type="text" id="createName" placeholder="e.g. prod, staging"
        style="width:100%;padding:0.5rem 0.625rem;border:1px solid hsl(var(--border));border-radius:var(--radius);background:hsl(var(--background));color:hsl(var(--foreground));font-family:inherit;font-size:0.8125rem;outline:none;"
        oninput="validateCreateName(this); syncDatabaseNameFromEnvName(this.value)">
      <div id="createNameErr" style="font-size:0.75rem;color:hsl(var(--destructive));margin-top:0.25rem;display:none"></div>
    </div>
    <div class="drawer-field">
      <label>Server Name</label>
      <div style="font-size:0.72rem;color:hsl(var(--muted-foreground));margin-bottom:0.375rem;">SQL server address for this environment. Overrides the global server name.</div>
      <input type="text" id="createServerName" placeholder="localhost"
        style="width:100%;padding:0.5rem 0.625rem;border:1px solid hsl(var(--border));border-radius:var(--radius);background:hsl(var(--background));color:hsl(var(--foreground));font-family:inherit;font-size:0.8125rem;outline:none;">
    </div>
    <div class="drawer-field">
      <label>Connection String <span style="color:hsl(var(--destructive))">*</span></label>
      <div style="position:relative;">
        <input type="password" id="createConnStr" placeholder="Server=...;Database=...;User Id=...;Password=...;"
          style="width:100%;padding:0.5rem 2rem 0.5rem 0.625rem;border:1px solid hsl(var(--border));border-radius:var(--radius);background:hsl(var(--background));color:hsl(var(--foreground));font-family:ui-monospace,monospace;font-size:0.75rem;outline:none;">
        <button type="button" onclick="togglePasswordVis('createConnStr', this)"
          style="position:absolute;right:0.375rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:hsl(var(--muted-foreground));padding:0.2rem;" title="Show / hide">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div style="font-size:0.72rem;color:hsl(var(--muted-foreground));margin-top:0.25rem;">Stored encrypted, never written to disk in plaintext.</div>
    </div>
    <div class="drawer-field">
      <label>Headers</label>
      <div style="font-size:0.72rem;color:hsl(var(--muted-foreground));margin-bottom:0.375rem;">HTTP headers forwarded with every request for this environment.</div>
      <div class="kv-editor" id="createHeaders"></div>
      <button class="ep-add-row" onclick="addCreateHeader()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add header
      </button>
    </div>
    <div id="createAuthContainer"></div>
  </div>
  <div class="drawer-footer">
    <button class="btn btn-outline" data-drawer-close="createDrawer">Cancel</button>
    <button class="btn btn-primary" onclick="submitCreate()" style="margin-left:auto">
      <span class="btn-label">Create</span>
      <span class="btn-spinner"></span>
    </button>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// State 
let state = {
  globalData: null,
  envData: {},
  selected: '__global__',
  rawMode: false,
  pollTimer: null,
  polledLastMod: null,
  isDirty: false,
};

function markDirty() { state.isDirty = true; }

function confirmNavigate(onConfirm) {
  if (!state.isDirty) {
    onConfirm();
    return;
  }
  
  AlertDialog.show({
    title: 'Are you sure?',
    description: 'You have unsaved changes. Are you sure you want to leave without saving?',
    actionLabel: 'Leave anyway',
    cancelLabel: 'Stay here',
    onConfirm: () => {
      state.isDirty = false;
      onConfirm();
    }
  });
}

function confirmNavigateSync() {
  if (!state.isDirty) return true;
  return confirm('You have unsaved changes. Leave without saving?');
}

window.addEventListener('beforeunload', e => {
  if (state.isDirty) { e.preventDefault(); e.returnValue = ''; }
});

// Tabs 
function renderTabs(envs) {
  const total = envs.length;
  const missing = Object.values(state.envData).filter(d => !d.exists).length;
  const tabs = [
    { key: 'all',     label: 'All',            count: total },
    { key: 'ok',      label: 'Configured',     count: total - missing },
    { key: 'missing', label: 'Missing Config',  count: missing },
  ];
  document.getElementById('envTabs').innerHTML = tabs.map(t => `
    <button class="ep-tab ${_activeTab === t.key ? 'active' : ''}" onclick="switchTab('${t.key}')">
      ${esc(t.label)}
      <span class="ep-tab-badge">${t.count}</span>
    </button>`).join('');
}

let _activeTab = 'all';

function switchTab(key) {
  _activeTab = key;
  const envs = state.globalData?.allowed_environments ?? [];
  renderTabs(envs);
  applyTabFilter();
}

function applyTabFilter() {
  document.querySelectorAll('#envListScroll .ep-list-item[data-env]').forEach(el => {
    const name = el.dataset.env;
    const d = state.envData[name];
    let show = true;
    if (_activeTab === 'ok')      show = d ? d.exists : true;
    if (_activeTab === 'missing') show = d ? !d.exists : false;
    el.style.display = show ? '' : 'none';
  });
}

// List filter
function filterEnvList() {
  const q = (document.getElementById('envSearchInput')?.value ?? '').toLowerCase();
  document.querySelectorAll('#envListScroll .ep-list-item[data-env]').forEach(el => {
    const name = (el.dataset.env ?? '').toLowerCase();
    const d = state.envData[el.dataset.env];
    let tabOk = true;
    if (_activeTab === 'ok')      tabOk = d ? d.exists : true;
    if (_activeTab === 'missing') tabOk = d ? !d.exists : false;
    el.style.display = (tabOk && (!q || name.includes(q))) ? '' : 'none';
  });
}

// Load global list
async function loadGlobal() {
  const d = await fetch('/ui/api/environments').then(r => r.json());
  state.globalData = d;
  const envs = d.allowed_environments ?? [];
  renderList(envs);
  return d;
}

function renderList(envs) {
  renderTabs(envs);
  const scroll = document.getElementById('envListScroll');

  const globalActive = state.selected === '__global__';
  let html = `<div class="ep-list-group">Global</div>
    <div class="ep-list-item ${globalActive ? 'active' : ''}" id="item-__global__" onclick="trySelect('__global__')">
      <span class="ep-type-dot" style="background:hsl(var(--muted-foreground))"></span>
      <span class="ep-list-name">Global Settings</span>
    </div>`;

  if (envs.length) {
    html += `<div class="ep-list-group">Environments</div>`;
    html += envs.map(name => {
      const isActive = state.selected === name;
      return `<div class="ep-list-item ${isActive ? 'active' : ''}" id="item-${esc(name)}" data-env="${esc(name)}" onclick="trySelect('${esc(name)}')">
        <span class="ep-type-dot dot-static" id="dot-${esc(name)}"></span>
        <span class="ep-list-name">${esc(name)}</span>
        <span id="badge-${esc(name)}"></span>
      </div>`;
    }).join('');
  }

  scroll.innerHTML = html;

  // Async status badges: fetch all, then refresh tab counts
  Promise.all(envs.map(async name => {
    try {
      const d = await fetch(`/ui/api/environments/${encodeURIComponent(name)}`).then(r => r.json());
      state.envData[name] = d;
      const dot = document.getElementById(`dot-${name}`);
      if (dot) {
        if (!d.exists) {
          dot.style.background = 'hsl(var(--destructive))';
          const badge = document.getElementById(`badge-${name}`);
          if (badge) badge.innerHTML = `<svg width="7" height="7" viewBox="0 0 8 8" style="fill:hsl(var(--destructive));flex-shrink:0" aria-label="Missing config"><circle cx="4" cy="4" r="4"/></svg>`;
        } else {
          dot.style.background = 'hsl(142 70% 45%)';
        }
      }
    } catch(_) {}
  })).then(() => {
    renderTabs(envs);
    applyTabFilter();
  });
}

function setActiveItem(id) {
  document.querySelectorAll('#envListScroll .ep-list-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`item-${id}`);
  if (el) el.classList.add('active');
}

// Navigation ────────────────────────────────────────────
function trySelect(target) {
  if (state.selected === target) return;
  confirmNavigate(() => {
    if (target === '__global__') selectGlobal();
    else selectEnv(target);
  });
}

function selectGlobal() {
  state.selected = '__global__';
  state.rawMode  = false;
  state.isDirty  = false;
  stopPoll();
  setActiveItem('__global__');
  renderGlobalDetail();
}

async function selectEnv(name) {
  state.selected = name;
  state.rawMode  = false;
  state.isDirty  = false;
  setActiveItem(name);
  stopPoll();
  await renderEnvDetail(name);
  startPoll(name);
}

// Global Settings Detail ────────────────────────────────
function renderGlobalDetail() {
  const d = state.globalData;
  document.getElementById('envDetail').innerHTML = `
    <div class="ep-detail-header">
      <span class="ep-type-dot" style="background:hsl(var(--muted-foreground))"></span>
      <h2>Global Settings</h2>
    </div>
    <div class="ep-detail-body">
      <div class="ep-section">
        <div class="ep-section-title">Server Name</div>
        <div class="ep-field">
          <label for="gServerName">Default SQL Server</label>
          <input type="text" id="gServerName" value="${esc(d?.server_name ?? '')}" placeholder="." oninput="markDirty()">
          <div class="ep-field-hint">Used when an environment has no server name of its own.</div>
        </div>
      </div>
      <div class="ep-section">
        <div class="ep-section-title">Allowed Environments</div>
        <div class="pill-list">
          ${(d?.allowed_environments ?? []).map(e => `<span class="pill">${esc(e)}</span>`).join('')}
        </div>
        <div class="ep-field-hint">Manage environments using the Add / Remove controls.</div>
      </div>
    </div>
    <div style="padding:0.75rem 1rem;border-top:1px solid hsl(var(--border));display:flex;gap:0.5rem;justify-content:flex-end;flex-shrink:0">
      <button class="btn btn-outline btn-sm" onclick="selectGlobal()">Discard</button>
      <button class="btn btn-primary btn-sm" onclick="saveGlobal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
    </div>`;
}

async function saveGlobal() {
  const serverName = document.getElementById('gServerName')?.value?.trim() ?? '';
  try {
    const r = await fetch('/ui/api/environments/settings', {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ server_name: serverName, allowed_environments: state.globalData?.allowed_environments ?? [] })
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.error ?? r.statusText); }
    state.isDirty = false;
    toast('Global settings saved');
    await loadGlobal();
    renderGlobalDetail();
  } catch(e) { toast(e.message, 'error'); }
}

// Per-environment Detail ────────────────────────────────
async function renderEnvDetail(name) {
  const detail = document.getElementById('envDetail');
  detail.innerHTML = `<div class="ep-empty"><span style="font-size:0.8rem;color:hsl(var(--muted-foreground))">Loading…</span></div>`;
  let d;
  try {
    d = await fetch(`/ui/api/environments/${encodeURIComponent(name)}`).then(r => r.json());
    if (d.error) throw new Error(d.error);
    state.envData[name] = d;
    state.polledLastMod = d.last_modified;
  } catch(e) {
    detail.innerHTML = `<div class="ep-empty"><span style="color:hsl(var(--destructive))">Error: ${esc(e.message)}</span></div>`;
    return;
  }
  paintEnvDetail(name, d, false);
}

let _envRenaming = false;

function paintEnvDetail(name, d, rawMode) {
  const headersHtml = buildKvEditor(d.headers ?? {});
  const nameHeader = _envRenaming
    ? `<input type="text" id="envRenameInput" value="${esc(name)}" style="font-size:1rem;font-weight:600;flex:1;min-width:0;border:1px solid hsl(var(--primary));border-radius:var(--radius);padding:0.2rem 0.5rem;background:hsl(var(--background));color:hsl(var(--foreground))" onkeydown="if(event.key==='Enter')confirmEnvRename('${esc(name)}');if(event.key==='Escape')cancelEnvRename()" autofocus>
       <button class="btn btn-primary btn-sm" onclick="confirmEnvRename('${esc(name)}')">Save</button>
       <button class="btn btn-outline btn-sm" onclick="cancelEnvRename()">Cancel</button>`
    : `<h2>${esc(name)}</h2>`;
  document.getElementById('envDetail').innerHTML = `
    <div id="changeBanner" style="display:none;padding:0.5rem 1rem;background:hsl(43 96% 56% / 0.1);border-bottom:1px solid hsl(43 96% 56% / 0.3);flex-shrink:0;align-items:center;gap:0.5rem;font-size:0.8125rem;color:hsl(43 85% 45%)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      File changed externally.
      <button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="reloadEnv('${esc(name)}')">Reload</button>
    </div>
    <div class="ep-detail-header">
      <span class="ep-type-dot dot-static"></span>
      ${nameHeader}
      ${_envRenaming ? '' : `<div class="actions">
        <button class="btn btn-outline btn-sm shadcn-tooltip" onclick="startEnvRename()" data-tooltip="Rename environment">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Rename
        </button>
        <button class="btn btn-outline btn-sm" onclick="toggleRaw('${esc(name)}')" ${rawMode ? 'style="background:hsl(var(--muted))"' : ''}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          ${rawMode ? 'Form view' : 'Raw JSON'}
        </button>
        <button class="btn btn-outline btn-sm" onclick="startRemove('${esc(name)}')" style="color:hsl(var(--destructive));border-color:hsl(var(--destructive)/0.4)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Remove
        </button>
      </div>`}
    </div>
    <div class="ep-detail-body" id="envDetailBody">
      ${rawMode ? buildRawView(name, d) : buildFormView(name, d, headersHtml)}
    </div>
    <div style="padding:0.75rem 1rem;border-top:1px solid hsl(var(--border));display:flex;gap:0.5rem;justify-content:flex-end;flex-shrink:0">
      <button class="btn btn-outline btn-sm" onclick="reloadEnv('${esc(name)}')">Discard</button>
      ${rawMode
        ? `<button class="btn btn-outline btn-sm" onclick="validateRaw(true)">Validate</button>
           <button class="btn btn-primary btn-sm" onclick="saveRaw('${esc(name)}')">
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
             Save JSON
           </button>`
        : `<button class="btn btn-primary btn-sm" onclick="saveEnv('${esc(name)}')">
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
             Save
           </button>`}
    </div>`;
}

function buildFormView(name, d, headersHtml) {
  const notExists = !d.exists;
  return `
    ${notExists ? `<div style="padding:0.5rem 0.75rem;background:hsl(43 96% 56% / 0.1);border:1px solid hsl(43 96% 56% / 0.3);border-radius:var(--radius);font-size:0.8rem;color:hsl(43 85% 45%);display:flex;align-items:center;gap:0.5rem">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      No settings.json found, saving will create it.
    </div>` : ''}
    <div class="ep-section">
      <div class="ep-section-title">Server</div>
      <div class="ep-field">
        <label for="editServerName">Server Name</label>
        <input type="text" id="editServerName" value="${esc(d.server_name ?? '')}" placeholder="localhost" oninput="markDirty()">
        <div class="ep-field-hint">Overrides the global server name for this environment.</div>
      </div>
    </div>
    <div class="ep-section">
      <div class="ep-section-title">Connection String</div>
      ${d.connection_string_encrypted
        ? `<div style="display:flex;align-items:center;gap:0.625rem;flex-wrap:wrap;margin-bottom:0.375rem;">

               </button>

             <button type="button" onclick="togglePasswordVis('editConnStr', this)"
               style="position:absolute;right:0.375rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:hsl(var(--muted-foreground));padding:0.2rem;">

function buildAuthSection(auth, prefix = 'edit') {
  auth = auth || { enabled: false, override_global_token: false, methods: [] };
  const methodsHtml = (auth.methods || []).map(m => buildAuthMethodCard(m)).join('');
  
  return `
    <div class="ep-section">
      <div class="ep-section-title">Authentication</div>
      
      <div style="display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1rem;">
        <div style="display:flex;align-items:center;gap:0.625rem;cursor:pointer;" onclick="document.getElementById('${prefix}AuthEnabled').click()">
          <label class="switch" onclick="event.stopPropagation()">
            <input type="checkbox" id="${prefix}AuthEnabled" ${auth.enabled ? 'checked' : ''} onchange="toggleAuthUI('${prefix}'); markDirty()">
            <span class="slider"></span>
          </label>
          <span style="font-size:0.8125rem;font-weight:500;">Enable custom authentication</span>
        </div>

        <div id="${prefix}AuthOverrideContainer" style="display:flex;align-items:center;gap:0.625rem;cursor:pointer;${auth.enabled ? '' : 'opacity:0.5;pointer-events:none'}" 
             onclick="document.getElementById('${prefix}AuthOverride').click()">
          <label class="switch" onclick="event.stopPropagation()">
            <input type="checkbox" id="${prefix}AuthOverride" ${auth.override_global_token ? 'checked' : ''} onchange="markDirty()">
            <span class="slider"></span>
          </label>
          <span style="font-size:0.8125rem;font-weight:500;">Override global token</span>
        </div>
      </div>

      <div id="${prefix}AuthMethodsContainer" style="${auth.enabled ? '' : 'display:none;'}">
        <div id="${prefix}AuthMethodsList" style="display:flex;flex-direction:column;gap:0.75rem;margin-bottom:0.75rem;">
          ${methodsHtml}
        </div>
        <button class="btn btn-outline btn-sm" onclick="addAuthMethod('${prefix}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Method
        </button>
      </div>
    </div>
  `;
}

function buildAuthMethodCard(m) {
  m = m || { type: 'ApiKey', name: '', value: '', in: 'Header' };
  
  const typeOptions = ['ApiKey', 'Basic', 'Bearer', 'JWT', 'HMAC'].map(t => 
    `<option value="${t}" ${m.type === t ? 'selected' : ''}>${t}</option>`
  ).join('');

  return `
    <div class="card auth-method-item">
      <div class="card-header" style="padding:0.5rem 1rem;background:hsl(var(--muted)/0.3);border-bottom:1px solid hsl(var(--border));display:flex;align-items:center;gap:0.75rem;">
        <span class="badge badge-muted">Method</span>
        <select class="auth-type-sel" style="height:1.75rem;font-size:0.75rem;padding:0 0.25rem;width:120px;" onchange="updateAuthFields(this); markDirty()">
          ${typeOptions}
        </select>
        <button class="btn-icon btn-destructive" style="margin-left:auto" onclick="this.closest('.auth-method-item').remove(); markDirty()" title="Remove method">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="card-body auth-fields" style="padding:0.75rem 1rem;display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
        ${buildAuthFieldsForType(m)}
      </div>
    </div>
  `;
}

function updateAuthFields(sel) {
  const type = sel.value;
  const fieldsContainer = sel.closest('.auth-method-item').querySelector('.auth-fields');
  fieldsContainer.innerHTML = buildAuthFieldsForType({ type, name: '', value: '', in: 'Header' });
}

function buildAuthFieldsForType(m) {
  const pwdStyle = 'width:100%;padding:0.5rem 2rem 0.5rem 0.625rem;border:1px solid hsl(var(--border));border-radius:var(--radius);background:hsl(var(--background));color:hsl(var(--foreground));font-family:ui-monospace,monospace;font-size:0.75rem;outline:none;';
  const toggleBtn = `
    <button type="button" onclick="const input = this.previousElementSibling; input.type = input.type === 'password' ? 'text' : 'password'; this.style.color = input.type === 'text' ? 'hsl(var(--foreground))' : 'hsl(var(--muted-foreground))';"
      style="position:absolute;right:0.375rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:hsl(var(--muted-foreground));padding:0.2rem;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>`;

  if (m.type === 'JWT') {
    return `
      <div class="ep-field">
        <label>Issuer</label>
        <input type="text" class="auth-f-issuer" value="${esc(m.issuer || '')}" oninput="markDirty()">
      </div>
      <div class="ep-field">
        <label>Audience</label>
        <input type="text" class="auth-f-audience" value="${esc(m.audience || '')}" oninput="markDirty()">
      </div>
      <div class="ep-field">
        <label>Algorithm</label>
        <select class="auth-f-algorithm" onchange="markDirty()">
          ${['HS256', 'RS256', 'None'].map(a => `<option value="${a}" ${m.algorithm === a ? 'selected' : ''}>${a}</option>`).join('')}
        </select>
      </div>
      <div class="ep-field">
        <label>Secret</label>
        <div style="position:relative;">
          <input type="password" class="auth-f-secret" placeholder="e.g. Abc" value="${esc(m.secret || '')}" oninput="markDirty()" style="${pwdStyle}">
          ${toggleBtn}
        </div>
      </div>
      <div class="ep-field" style="grid-column:1/-1;">
        <label>Public Key (PEM)</label>
        <textarea class="auth-f-publickey" style="min-height:60px;font-size:0.7rem;" placeholder="-----BEGIN PUBLIC KEY-----" oninput="markDirty()">${esc(m.publicKey || '')}</textarea>
      </div>
      <div class="ep-field">
        <label>Client ID</label>
        <input type="text" class="auth-f-clientid" value="${esc(m.clientId || '')}" placeholder="Optional" oninput="markDirty()">
      </div>
      <div class="ep-field">
        <label>Client Secret</label>
        <div style="position:relative;">
          <input type="password" class="auth-f-clientsecret" value="${esc(m.clientSecret || '')}" placeholder="Optional" oninput="markDirty()" style="${pwdStyle}">
          ${toggleBtn}
        </div>
      </div>
      <div class="ep-field" style="grid-column:1/-1;">
        <label>Introspection Endpoint</label>
        <input type="text" class="auth-f-introspection" value="${esc(m.introspectionEndpoint || '')}" placeholder="https://..." oninput="markDirty()">
      </div>
    `;
  }
  
  if (m.type === 'HMAC') {
    return `
      <div class="ep-field">
        <label>Header Name</label>
        <input type="text" class="auth-f-name" value="${esc(m.name || 'X-Signature')}" placeholder="e.g. X-Signature" oninput="markDirty()">
      </div>
      <div class="ep-field">
        <label>Shared Secret</label>
        <div style="position:relative;">
          <input type="password" class="auth-f-secret" placeholder="E.g. Abc" value="${esc(m.secret || '')}" oninput="markDirty()" style="${pwdStyle}">
          ${toggleBtn}
        </div>
      </div>
    `;
  }
  
  return `
    <div class="ep-field">
      <label>${m.type === 'Basic' ? 'Username' : 'Name'}</label>
      <input type="text" class="auth-f-name" value="${esc(m.name || '')}" placeholder="${m.type === 'Bearer' ? 'n/a' : 'e.g. X-API-Key'}" oninput="markDirty()">
    </div>
    <div class="ep-field">
      <label>${m.type === 'Basic' ? 'Password' : 'Value'}</label>
      <div style="position:relative;">
        <input type="password" class="auth-f-value" placeholder="e.g. ABC" value="${esc(m.value || '')}" oninput="markDirty()" style="${pwdStyle}">
        ${toggleBtn}
      </div>
    </div>
    <div class="ep-field" style="grid-column:1/-1;">
      <label>In</label>
      <select class="auth-f-in" onchange="markDirty()">
        ${['Header', 'Query', 'Cookie'].map(i => `<option value="${i}" ${m.in === i ? 'selected' : ''}>${i}</option>`).join('')}
      </select>
    </div>
  `;
}

function toggleAuthUI(prefix) {
  const enabled = document.getElementById(`${prefix}AuthEnabled`)?.checked;
  const container = document.getElementById(`${prefix}AuthMethodsContainer`);
  const overrideCont = document.getElementById(`${prefix}AuthOverrideContainer`);
  if (container) container.style.display = enabled ? 'block' : 'none';
  if (overrideCont) {
    overrideCont.style.opacity = enabled ? '1' : '0.5';
    overrideCont.style.pointerEvents = enabled ? 'auto' : 'none';
  }
}

function addAuthMethod(prefix) {
  const container = document.getElementById(`${prefix}AuthMethodsList`);
  if (!container) return;
  const div = document.createElement('div');
  div.innerHTML = buildAuthMethodCard({ type: 'ApiKey', name: '', value: '', in: 'Header' }).trim();
  container.appendChild(div.firstChild);
  markDirty();
}

function collectAuthData(prefix = 'edit') {
  const enabled = document.getElementById(`${prefix}AuthEnabled`)?.checked ?? false;
  const override = document.getElementById(`${prefix}AuthOverride`)?.checked ?? false;
  const methods = [];
  
  if (enabled) {
    const list = document.getElementById(`${prefix}AuthMethodsList`);
    if (list) {
      list.querySelectorAll('.auth-method-item').forEach(item => {
        const type = item.querySelector('.auth-type-sel')?.value;
        const m = { type };
        
        if (type === 'JWT') {
          m.issuer = item.querySelector('.auth-f-issuer')?.value;
          m.audience = item.querySelector('.auth-f-audience')?.value;
          m.secret = item.querySelector('.auth-f-secret')?.value;
          m.publicKey = item.querySelector('.auth-f-publickey')?.value;
          m.algorithm = item.querySelector('.auth-f-algorithm')?.value;
          m.clientId = item.querySelector('.auth-f-clientid')?.value;
          m.clientSecret = item.querySelector('.auth-f-clientsecret')?.value;
          m.introspectionEndpoint = item.querySelector('.auth-f-introspection')?.value;
        } else if (type === 'HMAC') {
          m.name = item.querySelector('.auth-f-name')?.value;
          m.secret = item.querySelector('.auth-f-secret')?.value;
        } else {
          m.name = item.querySelector('.auth-f-name')?.value;
          m.value = item.querySelector('.auth-f-value')?.value;
          m.in = item.querySelector('.auth-f-in')?.value;
        }
        methods.push(m);
      });
    }
  }
  
  return { enabled, override_global_token: override, methods };
}

function buildRawView(name, d) {
  return `
    <div class="ep-field-hint" style="padding-bottom:0.5rem;border-bottom:1px solid hsl(var(--border));margin-bottom:0.75rem">
      Editing <code style="font-family:ui-monospace,monospace">environments/${esc(name)}/settings.json</code> directly.
      Any plaintext <code style="font-family:ui-monospace,monospace">ConnectionString</code> will be automatically encrypted on save.
    </div>
    <div class="ep-raw-editor" style="flex:1;display:flex;flex-direction:column;">
      <textarea id="rawTextarea" spellcheck="false" oninput="validateRaw(); markDirty();" style="flex:1;min-height:260px;">${esc(d._rawContent ?? '')}</textarea>
      <div id="rawError" style="font-size:0.75rem;color:hsl(var(--destructive));margin-top:0.25rem;"></div>
    </div>`;
}

function addEditHeader() { addKvRow('editHeadersContainer'); }

function toggleReplaceCs() {
  const el = document.getElementById('replaceCs');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// Test connection ───────────────────────────────────────
async function testConnection(name) {
  const btn = document.getElementById('testBtn');
  const result = document.getElementById('testResult');
  if (!btn || !result) return;
  btn.disabled = true;
  btn.textContent = 'Testing…';
  result.style.display = 'none';
  try {
    const r = await fetch(`/ui/api/environments/${encodeURIComponent(name)}/test`, { method: 'POST' });
    const d = await r.json();
    result.style.display = 'block';
    if (d.ok) {
      result.style.color = 'hsl(var(--success))';
      result.textContent = '✓ Connection successful';
    } else {
      result.style.color = 'hsl(var(--destructive))';
      result.textContent = `✗ ${d.error ?? 'Connection failed'}`;
    }
  } catch(e) {
    result.style.display = 'block';
    result.style.color = 'hsl(var(--destructive))';
    result.textContent = `✗ ${e.message}`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Test`;
  }
}

// Save form ─────────────────────────────────────────────
async function saveEnv(name) {
  const serverName = document.getElementById('editServerName')?.value?.trim() ?? null;
  const csEl = document.getElementById('editConnStr');
  const connStr = csEl?.value?.trim() ?? '';
  const headerErr = validateHeaders('editHeadersContainer');
  if (headerErr) { toast(headerErr, 'error'); return; }
  const headers = collectHeaders('editHeadersContainer');
  const auth = collectAuthData();

  const body = { server_name: serverName, headers, authentication: auth };
  if (connStr) body.connection_string = connStr;

  try {
    const r = await fetch(`/ui/api/environments/${encodeURIComponent(name)}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.error ?? r.statusText); }
    const result = await r.json();
    state.polledLastMod = result.last_modified;
    state.isDirty = false;
    toast(`Saved ${name}`);
    hideBanner();
    const dot = document.getElementById(`dot-${name}`);
    if (dot) dot.style.background = 'hsl(142 70% 45%)';
    const badge = document.getElementById(`badge-${name}`);
    if (badge) badge.innerHTML = '';
    const d = await fetch(`/ui/api/environments/${encodeURIComponent(name)}`).then(r => r.json());
    state.envData[name] = d;
  } catch(e) { toast(e.message, 'error'); }
}

// Raw JSON mode ─────────────────────────────────────────
async function toggleRaw(name) {
  confirmNavigate(async () => {
    state.rawMode = !state.rawMode;
    const d = state.envData[name] ?? {};
    if (state.rawMode) {
      try {
        const r = await fetch(`/ui/api/environments/${encodeURIComponent(name)}/raw`).then(r => r.json());
        d._rawContent = r.content;
        state.polledLastMod = r.last_modified;
      } catch(_) {
        d._rawContent = JSON.stringify({ ConnectionString: '', ServerName: d.server_name ?? '', Headers: d.headers ?? {} }, null, 2);
      }
      state.envData[name] = d;
    }
    paintEnvDetail(name, d, state.rawMode);
  });
}

function validateRaw(showMsg = false) {
  const ta  = document.getElementById('rawTextarea');
  const err = document.getElementById('rawError');
  if (!ta || !err) return true;
  try {
    const parsed = JSON.parse(ta.value);
    if (typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('Must be a JSON object');
    err.textContent = '';
    if (showMsg) toast('JSON is valid', 'success');
    return true;
  } catch(e) {
    err.textContent = e.message;
    if (showMsg) toast(e.message, 'error');
    return false;
  }
}

async function saveRaw(name) {
  if (!validateRaw(true)) return;
  const content = document.getElementById('rawTextarea')?.value ?? '';
  try {
    const r = await fetch(`/ui/api/environments/${encodeURIComponent(name)}/raw`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.error ?? r.statusText); }
    const result = await r.json();
    state.polledLastMod = result.last_modified;
    state.isDirty = false;
    hideBanner();
    toast(`Saved ${name}`);
    const d = await fetch(`/ui/api/environments/${encodeURIComponent(name)}`).then(r => r.json());
    d._rawContent = content;
    state.envData[name] = d;
    const dot = document.getElementById(`dot-${name}`);
    if (dot) dot.style.background = 'hsl(142 70% 45%)';
    const badge = document.getElementById(`badge-${name}`);
    if (badge) badge.innerHTML = '';
  } catch(e) { toast(e.message, 'error'); }
}

// Hot-update polling
function startPoll(name) {
  stopPoll();
  state.pollTimer = setInterval(async () => {
    if (state.selected !== name) return stopPoll();
    try {
      const r = await fetch(`/ui/api/environments/${encodeURIComponent(name)}`).then(r => r.json());
      if (r.last_modified && r.last_modified !== state.polledLastMod) {
        state.polledLastMod = r.last_modified;
        showBanner();
      }
    } catch(_) {}
  }, 5000);
}

function stopPoll()  { if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; } }
function showBanner(){ const b = document.getElementById('changeBanner'); if (b) b.style.display = 'flex'; }
function hideBanner(){ const b = document.getElementById('changeBanner'); if (b) b.style.display = 'none'; }

async function reloadEnv(name) {
  confirmNavigate(async () => {
    state.rawMode = false;
    hideBanner();
    await renderEnvDetail(name);
  });
}

// Alert Dialog - using shared component

function showAlertDialog({ title, description, actionLabel = 'Confirm', onConfirm, extraHtml = '' }) {
  AlertDialog.show({
    title,
    description,
    actionLabel,
    variant: actionLabel.toLowerCase() === 'remove' || actionLabel.toLowerCase() === 'delete' ? 'destructive' : 'default',
    extraHtml,
    onConfirm
  });
}

function hideAlertDialog() {
  AlertDialog.hide();
}

function confirmAlertDialog() {
  // Handled by AlertDialog component
}

// Remove environment ────────────────────────────────────

function startRemove(name) {
  showAlertDialog({
    title: `Remove "${name}"?`,
    description: 'This will remove the environment from the allowed list. The configuration file will be kept unless you choose to delete it.',
    actionLabel: 'Remove',
    extraHtml: `<div style="display:flex;align-items:center;gap:0.625rem;cursor:pointer;margin-top:0.5rem;" onclick="document.getElementById('deleteFilesSwitch').click()">
      <label class="switch" onclick="event.stopPropagation()">
        <input type="checkbox" id="deleteFilesSwitch">
        <span class="slider"></span>
      </label>
      <span style="font-size:0.8125rem;font-weight:500;">Also delete environment files</span>
    </div>`,
    onConfirm: () => doRemove(name)
  });
}

async function doRemove(name) {
  const deleteFiles = document.getElementById('deleteFilesSwitch')?.checked ?? false;
  try {
    const r = await fetch(`/ui/api/environments/${encodeURIComponent(name)}?delete_files=${deleteFiles}`, { method: 'DELETE' });
    if (!r.ok) { const e = await r.json(); throw new Error(e.error ?? r.statusText); }
    toast(`Removed ${name}`, 'warning');
    stopPoll();
    state.selected = '__global__';
    state.rawMode  = false;
    state.isDirty  = false;
    await loadGlobal();
    setActiveItem('__global__');
    renderGlobalDetail();
  } catch(e) { toast(e.message, 'error'); }
}

// Rename environment ────────────────────────────────────

function startEnvRename() {
  _envRenaming = true;
  const name = state.selected;
  const d = state.envData[name] ?? {};
  paintEnvDetail(name, d, state.rawMode);
}

function cancelEnvRename() {
  _envRenaming = false;
  const name = state.selected;
  const d = state.envData[name] ?? {};
  paintEnvDetail(name, d, state.rawMode);
}

async function confirmEnvRename(oldName) {
  const newName = document.getElementById('envRenameInput')?.value?.trim() ?? '';
  if (!newName) { toast('Name is required', 'error'); return; }
  if (!/^[a-zA-Z0-9_-]+$/.test(newName)) {
    toast('Name may only contain letters, numbers, hyphens, and underscores', 'error'); return;
  }
  try {
    const r = await fetch(`/ui/api/environments/${encodeURIComponent(oldName)}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ new_name: newName })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error ?? r.statusText);
    toast('Renamed successfully', 'success');
    _envRenaming = false;
    state.selected = newName;
    state.rawMode = false;
    state.isDirty = false;
    stopPoll();
    await loadGlobal();
    setActiveItem(newName);
    await renderEnvDetail(newName);
    startPoll(newName);
  } catch(e) { toast('Rename failed: ' + e.message, 'error'); }
}

// Create environment drawer ─────────────────────────────
let _preDrawerDirty = false;
function openCreateDrawer() {
  _preDrawerDirty = state.isDirty;
  document.getElementById('createName').value       = '';
  document.getElementById('createServerName').value = state.globalData?.server_name ?? '';
  document.getElementById('createConnStr').value    = '';
  document.getElementById('createNameErr').style.display = 'none';
  document.getElementById('createHeaders').innerHTML = buildKvEditor({ 
    DatabaseName: '', 
    ServerName: '', 
    Origin: 'Portway' 
  });
  document.getElementById('createAuthContainer').innerHTML = buildAuthSection(null, 'create');
  Drawer.open('createDrawer');
  setTimeout(() => document.getElementById('createName').focus(), 150);
}

function closeCreateDrawer() {
  Drawer.close('createDrawer');
}

function syncDatabaseNameFromEnvName(value) {
  document.querySelectorAll('#createHeaders .kv-row').forEach(row => {
    const keyInput = row.querySelector('.kv-key-input');
    const valInput = row.querySelector('.kv-val-input');
    if (keyInput?.value?.trim() === 'DatabaseName' && valInput && !valInput.dataset.userEdited)
      valInput.value = value;
  });
}

function addCreateHeader() {
  addKvRow('createHeaders', { onValueInput: e => { e.target.dataset.userEdited = '1'; } });
}

function validateCreateName(input) {
  const err = document.getElementById('createNameErr');
  const ok  = /^[a-zA-Z0-9_-]*$/.test(input.value);
  err.textContent   = ok ? '' : 'Only letters, numbers, hyphens, and underscores allowed.';
  err.style.display = ok ? 'none' : 'block';
}

async function submitCreate() {
  const name       = document.getElementById('createName').value.trim();
  const serverName = document.getElementById('createServerName').value.trim();
  const connStr    = document.getElementById('createConnStr').value.trim();

  if (!name)                            { toast('Name is required', 'error'); return; }
  if (!/^[a-zA-Z0-9_-]+$/.test(name)) { toast('Invalid name format', 'error'); return; }
  if (!connStr)                         { toast('Connection string is required', 'error'); return; }
  const headerErr = validateHeaders('createHeaders');
  if (headerErr)                        { toast(headerErr, 'error'); return; }

  const headers = collectHeaders('createHeaders');
  const auth = collectAuthData('create');
  const btn = document.querySelector('#createDrawer .btn-primary');
  btn?.classList.add('is-loading');
  try {
    const r = await fetch('/ui/api/environments', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, server_name: serverName, connection_string: connStr, headers, authentication: auth })
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.error ?? r.statusText); }
    toast(`Environment "${name}" created`, 'success');
    closeCreateDrawer();
    await loadGlobal();
    selectEnv(name);
  } catch(e) { toast(e.message, 'error'); }
  finally { btn?.classList.remove('is-loading'); }
}

// Init 
async function refreshAll() {
  const prev = state.selected;
  confirmNavigate(async () => {
    await loadGlobal();
    if (prev === '__global__') renderGlobalDetail();
    else { await renderEnvDetail(prev); startPoll(prev); }
  });
}
async function init() {
  Drawer.onClose('createDrawer', () => { state.isDirty = _preDrawerDirty; });
  try {
    await loadGlobal();
    selectGlobal();
  } catch(e) {
    document.getElementById('envDetail').innerHTML =
      `<div class="ep-empty" style="color:hsl(var(--destructive))">Failed to load: ${esc(e.message)}</div>`;
  }
}

init();

function logout() {
  confirmNavigate(() => {
    fetch('/ui/api/auth/logout', { method: 'POST', credentials: 'include' })
      .finally(() => { window.location.href = (window.PortwayBase || '') + '/ui/login'; });
  });
}
</script>
