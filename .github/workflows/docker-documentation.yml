name: Build and Push Docker Image - Documentation

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'Pages/**'
      - 'Pages/Docker/**'
      - '.github/workflows/docker-documentation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Pages/**'

jobs:
  build-documentation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
   
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
   
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
   
    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ github.repository }}/documentation
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=ref,event=branch
          type=ref,event=pr
          type=sha,format=short
          type=raw,value=latest,enable={{is_default_branch}}
        flavor: |
          latest=auto
   
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
   
    - name: Build and push Documentation Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./Pages/Docker
        file: ./Pages/Docker/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Image digest
      run: echo ${{ steps.docker_build.outputs.digest }}
