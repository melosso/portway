services:
  portway:
    image: ghcr.io/melosso/portway:latest
    container_name: demo-portway
    ports:
      - "8080:8080"
    volumes:
      - ./config/environments:/app/environments
      - ./config/endpoints:/app/endpoints
      - ./tokens:/app/tokens
      - ./log:/app/log
      - ./data:/app/data
      - ./keys:/app/.core
    environment:
      - PORTWAY_ENCRYPTION_KEY=demo-encryption-key-12345
      - HostOptions__BackgroundServiceExceptionBehavior=Ignore
      - AllowedHosts=*
      - WebUi__AdminApiKey=demo-admin-key
      - WebUi__PublicOrigins__0=https://portway-demo.melosso.com
      - WebUi__SecureCookies=true
      - WebUi__Customization__PromoText=This is a demo instance. Some functions are disabled. All data will be reset periodically.
      - WebUi__Customization__PromoLogin=true
      - WebUi__Customization__LoginFooter=Use `demo-admin-key` for access. Please read the [documentation](https://github.com/melosso/portway) to learn more.
      - "OpenApi__Description=This is a demo of Portway. A lightweight API gateway designed to integrate your platforms, optimized for Windows environments.\nIt provides a simple, fast, and efficient way to connect data sources and services. Setup is quick and easy, requiring just a few configuration files to get your API running.\n\nResources to get started:\n\n* [Getting Started Guide](https://portway-docs.melosso.com/). Step-by-step docs to get you moving.\n* [GitHub Repository](https://github.com/melosso/portway). Open source and ready for contributions.\n* [Docker Compose](https://github.com/melosso/portway?tab=readme-ov-file#alternative-docker-compose). Simple setup, and yes, we love \U0001F433.\n\nJoin the community on GitHub to track updates, report issues, and contribute. Portway is free to use under the AGPL 3.0 license. Distribution must be done under the same license.\n\n> [!NOTE]\n> This is a sandbox environment and will be reset periodically."
      - Mcp__Enabled=true
      - Mcp__Path=/mcp
      - Mcp__RequireAuthentication=true
      - Mcp__AppsEnabled=true
      - Mcp__ChatEnabled=true
    depends_on:
      - nginx
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: demo-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    restart: unless-stopped
