services:
  portway:
    image: ghcr.io/melosso/portway:latest
    container_name: demo-portway
    ports:
      - "8080:8080"
    volumes:
      - ./config/environments:/app/environments
      - ./config/endpoints:/app/endpoints
      - ./tokens:/app/tokens
      - ./log:/app/log
      - ./data:/app/data
    environment:
      - PORTWAY_ENCRYPTION_KEY=demo-encryption-key-12345
      - Use_HTTPS=false
      - AllowedHosts=*
      - WebUi__AdminApiKey=demo-admin-key
      - WebUi__PublicOrigins__0=https://portway-demo.melosso.com
      - WebUi__SecureCookies=true
      - 'WebUi__Customization__PromoText=<div id="demo-banner">This is a demo instance. Some functions are disabled. All data will be reset periodically. Use <code id="api-key" style="cursor:pointer; background:rgba(0,0,0,0.1); padding:2px 4px; border-radius:4px;" onclick="navigator.clipboard.writeText('\''Beacon-Api-Key'\'').then(function(){alert('\''Copied!'\'')}).catch(function(e){console.error(e)})">Beacon-Api-Key</code> for access.</div>'
      - "WebUi__Customization__LoginFooter=If you don't have an account, please contact your [administrator](mailto:support@democompany.local)."
    depends_on:
      - nginx
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: demo-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    restart: unless-stopped
