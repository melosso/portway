events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    server {
        listen       80;
        server_name  localhost;

        # Mock Accounts
        location /api/accounts {
            if ($request_method = GET) {
                return 200 '[{"id": 1, "name": "Global Solutions"}, {"id": 2, "name": "Tech Corp"}]';
            }
            if ($request_method = POST) {
                return 201 '{"id": 3, "message": "Account created successfully"}';
            }
            if ($request_method = PUT) {
                return 200 '{"id": 1, "message": "Account updated successfully"}';
            }
            if ($request_method = DELETE) {
                return 200 '{"message": "Account deleted successfully"}';
            }
        }

        # Mock Company
        location /api/company {
            if ($request_method = GET) {
                return 200 '[{"id": 1, "name": "Main Office"}, {"id": 2, "name": "Branch Alpha"}]';
            }
            if ($request_method = POST) {
                return 201 '{"id": 3, "message": "Company created successfully"}';
            }
            if ($request_method = PUT) {
                return 200 '{"id": 1, "message": "Company updated successfully"}';
            }
            if ($request_method = DELETE) {
                return 200 '{"message": "Company deleted successfully"}';
            }
        }

        # Mock Products
        location /api/products {
            if ($request_method = GET) {
                return 200 '[{"id": 1, "sku": "P001", "name": "Standard Widget"}, {"id": 2, "sku": "P002", "name": "Premium Gadget"}]';
            }
            if ($request_method = POST) {
                return 201 '{"id": 3, "message": "Product created successfully"}';
            }
            if ($request_method = PUT) {
                return 200 '{"id": 1, "message": "Product updated successfully"}';
            }
            if ($request_method = DELETE) {
                return 200 '{"message": "Product deleted successfully"}';
            }
        }

        # Mock Production
        location /api/production {
            if ($request_method = GET) {
                return 200 '[{"id": 1, "order": "ORD-001", "status": "In Progress"}, {"id": 2, "order": "ORD-002", "status": "Completed"}]';
            }
            if ($request_method = POST) {
                return 201 '{"id": 3, "message": "Production order created successfully"}';
            }
            if ($request_method = PUT) {
                return 200 '{"id": 1, "message": "Production order updated successfully"}';
            }
            if ($request_method = DELETE) {
                return 200 '{"message": "Production order deleted successfully"}';
            }
        }

        # Health Check
        location /health {
            return 200 '{"status": "up"}';
        }
    }
}
