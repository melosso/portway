server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html;
    index index.html;

    # Allow all versioned paths (v1, v2, dev) to pass through unchanged
    location ~ ^/(v1|v2|dev)(/.*)?$ {
        try_files $uri $uri/ /index.html;
    }

    # Redirect root (/) to the default version
    location = / {
        return 301 /v1/;
    }

    # Redirect index.html to the default version
    location = /index.html {
        return 301 /v1/;
    }

    # Redirect any non-versioned request to the default version
    location / {
        return 301 /v1/;
    }

    # Serve index.html for SPA fallback
    location = /index.html {
        try_files $uri =404;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;

    # Remove server tokens for security
    server_tokens off;
}
